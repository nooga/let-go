<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>let-go — Clojure dialect in Go</title>
    <script src="wasm_exec.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.42.0/js/jquery.terminal.min.js"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.42.0/css/jquery.terminal.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0c0c0c;
        --fg: #e8e6df;
        --dim: #5a584f;
        --accent: #5ec4b6;
        --border: #1e1e1e;
        --mono: 'IBM Plex Mono', monospace;
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--mono);
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #page {
        width: 100%;
        max-width: 760px;
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0 1.5rem;
      }

      #header {
        padding: 2.5rem 0 1.5rem;
        display: flex;
        align-items: center;
        gap: 1.2rem;
      }

      #header .logo {
        width: 5em;
        height: 5em;
        flex-shrink: 0;
        opacity: 0.9;
      }

      #header .title {
        font-weight: 600;
        font-size: 1.1rem;
        letter-spacing: -0.02em;
      }

      #header .subtitle {
        font-size: 0.8rem;
        color: var(--dim);
        margin-top: 0.15rem;
      }

      #header .links {
        margin-left: auto;
        display: flex;
        gap: 1rem;
        font-size: 0.75rem;
      }

      #header .links a {
        color: var(--dim);
        text-decoration: none;
        transition: color 0.15s;
      }

      #header .links a:hover {
        color: var(--accent);
      }

      #loading {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        color: var(--dim);
      }

      #loading .dot {
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      #term-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 1rem 0 2rem;
        min-height: 0;
      }

      .terminal {
        --color: var(--fg) !important;
        --background: transparent !important;
        --font: var(--mono) !important;
        --size: 0.85rem !important;
        flex: 1;
      }

      .terminal .terminal-output .format {
        color: var(--fg);
      }

      .cmd .cmd-prompt {
        color: var(--accent) !important;
      }

      .cmd .cmd-cursor-line .cmd-cursor {
        background-color: var(--accent) !important;
        color: var(--bg) !important;
      }

      .terminal ::-webkit-scrollbar { width: 4px; }
      .terminal ::-webkit-scrollbar-track { background: transparent; }
      .terminal ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      @media (max-width: 600px) {
        #header { flex-wrap: wrap; padding: 1.5rem 0 1rem; }
        #header .links { width: 100%; margin-left: 0; margin-top: 0.5rem; }
        #page { padding: 0 1rem; }
      }

      #term-wrap { opacity: 0; transition: opacity 0.3s ease; }
      #term-wrap.visible { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="page">
      <div id="header">
        <a href="https://github.com/nooga/let-go">
          <img src="logo.svg" class="logo" alt="let-go" />
        </a>
        <div>
          <div class="title">λ let-go</div>
          <div class="subtitle">Clojure dialect &middot; bytecode VM &middot; written in Go</div>
        </div>
        <div class="links">
          <a href="https://github.com/nooga/let-go">source</a>
          <a href="https://github.com/nooga/let-go/releases">install</a>
        </div>
      </div>

      <div id="loading">
        <span>loading wasm<span class="dot">&nbsp;...</span></span>
      </div>

      <div id="term-wrap" style="display:none">
        <div id="term"></div>
      </div>
    </div>

    <script>
      function loadWasm(path) {
        const go = new Go();
        return WebAssembly.instantiateStreaming(fetch(path), go.importObject)
          .then((result) => {
            go.run(result.instance);
            return result.instance;
          });
      }

      loadWasm("letgo.wasm")
        .then((wasm) => {
          document.getElementById("loading").style.display = "none";
          const wrap = document.getElementById("term-wrap");
          wrap.style.display = "flex";
          requestAnimationFrame(() => wrap.classList.add("visible"));

          jQuery(function ($) {
            const term = $("#term").terminal(
              function (command) {
                if (command !== "") {
                  var result = Eval(command);
                  if (result != undefined) {
                    this.echo(result);
                  }
                }
              },
              {
                greetings: false,
                name: "let_go",
                prompt: "user> ",
                ansi: true,
                onInit: function() {
                  this.echo(" \u03bb   let-go (wasm)", {raw: false});
                  this.echo(' <span style="color:#5ec4b6">GO</span>   <span style="color:#5a584f">type (+ 1 1) to start</span>', {raw: true});
                  this.echo("");
                }
              }
            );
            console.log = (...args) => { term.echo(...args); }
          });
        })
        .catch((error) => {
          document.getElementById("loading").innerHTML =
            '<span style="color:#e05252">failed to load: ' + error + '</span>';
        });
    </script>
  </body>
</html>
